trigger:
  branches:
    include:
      - main

variables:
  dockerRegistryServiceConnection: 'dockerhub-connection'
  imageRepository: 'streezie/my-app'
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: Build and Push Docker Image
  jobs:
  - job: Build
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: Docker@2
      displayName: Build and Push Image
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: Dockerfile
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

- stage: Deploy_Staging
  displayName: Deploy to Staging
  dependsOn: Build
  jobs:
  - deployment: DeployStaging
    pool:
      name: 'Local-Minikube-Agent'
    environment: 'staging'
    strategy:
      runOnce:
        deploy:
          steps:
          # Pulls the K8s folder from your GitHub repo into this deployment job
          - checkout: self
          # Debug Step for Staging
          - script: |
              echo "--- Current working directory ---"
              pwd
              echo "--- Contents of Build.SourcesDirectory ---"
              ls -R $(Build.SourcesDirectory)
            displayName: 'Find my files'
          - task: KubernetesManifest@1
            inputs:
              action: deploy
              kubernetesServiceConnection: 'k8s-staging-connection'
              namespace: staging
              manifests: |
                $(Build.SourcesDirectory)/K8s/deployment.yaml
              containers: |
                $(imageRepository):$(tag)

- stage: Deploy_Production
  displayName: Deploy to Production
  dependsOn: Deploy_Staging
  jobs:
  - deployment: DeployProduction
    pool:
      name: 'Local-Minikube-Agent'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          # Pulls the K8s folder from your GitHub repo into this deployment job
          - checkout: self
          # Debug Step for Production
          - script: |
              echo "--- Current working directory ---"
              pwd
              echo "--- Contents of Build.SourcesDirectory ---"
              ls -R $(Build.SourcesDirectory)
            displayName: 'Find my files'
          - task: KubernetesManifest@1
            inputs:
              action: deploy
              kubernetesServiceConnection: 'k8s-production-connection'
              namespace: production
              manifests: |
                $(Build.SourcesDirectory)/K8s/deployment.yaml
              containers: |
                $(imageRepository):$(tag)